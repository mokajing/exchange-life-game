<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>交换人生 - 沉浸式人生体验</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0A0A0A; overflow: hidden; touch-action: none; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script src="js/renderer.js?v=7"></script>
  <script>
    // 动态加载timeline-player.js，确保Renderer已就绪
    (function() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', 'js/timeline-player.js?v=' + Date.now(), false); // 同步加载
      xhr.send();
      if (xhr.status === 200) {
        try {
          new Function('Renderer', xhr.responseText)(window.Renderer);
          console.log('[Loader] TimelinePlayer loaded:', typeof window.TimelinePlayer);
        } catch(e) {
          console.error('[Loader] TimelinePlayer load error:', e.message);
        }
      }
    })();
  </script>
  <script src="js/bgm-config.js?v=7"></script>
  <script src="game.js?v=7"></script>
</body>
</html>
